# openspec/config.yaml
schema: spec-driven

context: |
  Gestión de infraestructura del Grupo de Investigación Gidas.
  Stack: Proxmox (virtualización), Mikrotik (redes), Directory Servers (AD/FreeIPA).
  Lenguajes: Shell, YAML, TOML — sin código de aplicación (infraestructura pura).
  Sin CI, sin test runner, sin linter, sin formateador detectados.
  Proyecto nuevo — todos los subdirectorios de componentes están vacíos.
  No es un repositorio git (aún).

strict_tdd: false

testing:
  runner:
    available: false
    command: ""
    framework: ""
    reason: "No test runner detected — project is infrastructure-only (no package.json, go.mod, pyproject.toml, etc.)"
  layers:
    unit:
      available: false
      tool: ""
    integration:
      available: false
      tool: ""
    e2e:
      available: false
      tool: ""
  coverage:
    available: false
    command: ""
  quality:
    linter:
      available: false
      command: ""
    type_checker:
      available: false
      command: ""
    formatter:
      available: false
      command: ""

rules:
  proposal:
    - Incluir plan de rollback para cambios riesgosos
    - Especificar impacto en servicios de infraestructura
  specs:
    - Usar Given/When/Then para escenarios
    - Usar palabras clave RFC 2119 (MUST, SHALL, SHOULD, MAY)
  design:
    - Incluir diagramas de secuencia para flujos complejos
    - Documentar decisiones de arquitectura con fundamentos
  tasks:
    - Agrupar por fase, usar numeración jerárquica
    - Mantener tareas completables en una sesión
  apply:
    - Seguir patrones existentes del proyecto
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: ""
    coverage_threshold: 0
  archive:
    - Advertir antes de fusionar deltas destructivos

artifact_store: openspec
