# ================================================================
# nginx — Redmine Reverse Proxy + SSL
# ================================================================
# Redirect HTTP → HTTPS, proxy to redmine:3000
# ================================================================

upstream redmine_backend {
    server redmine:3000;
}

# HTTP → HTTPS redirect (named vhost)
server {
    listen 80;
    server_name redmine.gidas.local;
    return 301 https://$host$request_uri;
}

# Default HTTP — serve Redmine when accessed by IP or localhost
server {
    listen 80 default_server;
    server_name _ localhost;

    # Assets estáticos del tema GIDAS
    location /theme-assets/ {
        alias /usr/share/nginx/html/theme-assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Favicon — regex para .ico y .png
    location ~ ^/favicon\.(ico|png)$ {
        return 301 /theme-assets/favicon_utn.png;
    }

    location /dashboard/ {
        alias /usr/share/nginx/html/dashboard/;
        index index.html;
    }

    location / {
        proxy_pass http://redmine_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;
    }
    client_max_body_size 100m;
}

# HTTPS server
server {
    listen 443 ssl;
    http2 on;
    server_name redmine.gidas.local;

    # Self-signed certificates (generated by 04-configure-ssl.sh)
    ssl_certificate     /etc/nginx/ssl/redmine.crt;
    ssl_certificate_key /etc/nginx/ssl/redmine.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Max upload size — Redmine attachment limit
    client_max_body_size 100m;

    # Assets estáticos del tema GIDAS (logos, favicons)
    location /theme-assets/ {
        alias /usr/share/nginx/html/theme-assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Favicon — regex para .ico y .png
    location ~ ^/favicon\.(ico|png)$ {
        return 301 /theme-assets/favicon_utn.png;
    }

    # Dashboard público — tabla dinámica de peticiones
    location /dashboard/ {
        alias /usr/share/nginx/html/dashboard/;
        index index.html;
    }

    # ===== SUBPATH PROXY (/redmine/) =====
    # Para acceso via tunnel Cloudflare desde CT 208
    location /redmine/ {
        rewrite ^/redmine(/.*)$ $1 break;
        proxy_pass http://redmine_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;
        sub_filter_once off;
        sub_filter_types text/html text/css application/javascript;
        sub_filter 'href="/' 'href="/redmine/';
        sub_filter 'src="/' 'src="/redmine/';
        sub_filter "action='/search" "action='/redmine/search";
        sub_filter 'action="/search' 'action="/redmine/search';
    }

    location / {
        proxy_pass http://redmine_backend;
        proxy_redirect off;
        proxy_buffering off;
        proxy_set_header Connection "";
    }
}
