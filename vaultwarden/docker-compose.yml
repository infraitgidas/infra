# ============================================================
# docker-compose.yml — Vaultwarden
# ============================================================
# Uso:
#   1. Copiar .env.example a .env y completar variables
#   2. docker compose up -d
# ============================================================

services:
  vaultwarden:
    image: vaultwarden/server:latest-alpine
    container_name: vaultwarden
    restart: unless-stopped
    ports:
      - "127.0.0.1:3012:80"
    volumes:
      - ./data:/data
    env_file:
      - .env
