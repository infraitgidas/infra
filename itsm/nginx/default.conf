# ================================================================
# nginx/default.conf — Reverse Proxy for GLPI
# ================================================================
# Proxies requests to the GLPI Apache backend.
# SSL termination happens here (certs expected at /etc/nginx/certs/).
# ================================================================

upstream glpi_backend {
    server glpi:80 max_fails=3 fail_timeout=30s;
}

server {
    listen 80 default_server;
    server_name ${NGINX_SERVER_NAME:-glpi.gidas.local};

    # Redirect all HTTP to HTTPS (production)
    # Comment out the return and enable the location / block below for dev
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    server_name ${NGINX_SERVER_NAME:-glpi.gidas.local};

    # SSL certificates — replace with real certs in production
    ssl_certificate     /etc/nginx/certs/glpi.crt;
    ssl_certificate_key /etc/nginx/certs/glpi.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Maximum upload size (GLPI attachments)
    client_max_body_size 50M;

    # Root for GLPI
    location / {
        proxy_pass http://glpi_backend;
        proxy_buffering off;
        proxy_redirect off;

        # WebSocket support for GLPI
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Serve GLPI files directly (documents, attachments)
    location /files {
        alias /var/www/glpi/files;
        internal;  # Only accessible via GLPI internal redirects
    }

    # Deny access to sensitive paths
    location ~ ^/(config|marketplace|plugins|vendor|node_modules) {
        deny all;
        return 404;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    # phpMyAdmin / adminer block
    location ~ /(phpmyadmin|adminer|pma) {
        deny all;
        return 404;
    }
}

# Dev-only: plain HTTP access (no SSL)
server {
    listen 8080;
    server_name localhost;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    client_max_body_size 50M;

    location / {
        proxy_pass http://glpi_backend;
        proxy_buffering off;
        proxy_redirect off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /files {
        alias /var/www/glpi/files;
        internal;
    }

    location ~ ^/(config|marketplace|plugins|vendor|node_modules) {
        deny all;
        return 404;
    }

    location ~ /\. {
        deny all;
        return 404;
    }
}
