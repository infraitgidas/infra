# ================================================================
# docker-compose.yml — GLPI ITSM Stack
# ================================================================
# Services: mariadb, glpi (PHP-FPM + Apache), nginx (reverse proxy)
# ================================================================

services:
  mariadb:
    image: mariadb:10.11
    container_name: glpi-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-glpi_root_secret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-glpi}
      MYSQL_USER: ${MYSQL_USER:-glpi}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-glpi_password}
    volumes:
      - glpi_mariadb_data:/var/lib/mysql
      - ${PWD}/config/mariadb:/etc/mysql/conf.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - glpi_net

  glpi:
    image: diouxx/glpi:10.0.x
    container_name: glpi-app
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      MARIADB_HOST: mariadb
      MARIADB_PORT: 3306
      MARIADB_DATABASE: ${MYSQL_DATABASE:-glpi}
      MARIADB_USER: ${MYSQL_USER:-glpi}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD:-glpi_password}
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-glpi_root_secret}
      TIMEZONE: ${GLPI_TIMEZONE:-America/Argentina/Buenos_Aires}
      GLPI_LANG: ${GLPI_LANG:-es_AR}
    volumes:
      - glpi_config:/var/www/html/glpi/config
      - glpi_plugins:/var/www/html/glpi/plugins
      - glpi_documents:/var/www/html/glpi/files
      - glpi_marketplace:/var/www/html/glpi/marketplace
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - glpi_net

  nginx:
    image: nginx:1.25-alpine
    container_name: glpi-nginx
    restart: unless-stopped
    depends_on:
      glpi:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ${PWD}/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - glpi_documents:/var/www/glpi/files:ro
    networks:
      - glpi_net

networks:
  glpi_net:
    name: glpi_network
    driver: bridge

volumes:
  glpi_mariadb_data:
    name: glpi_mariadb_data
  glpi_config:
    name: glpi_config
  glpi_plugins:
    name: glpi_plugins
  glpi_documents:
    name: glpi_documents
  glpi_marketplace:
    name: glpi_marketplace
